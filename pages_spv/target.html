<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPV Desktop - Target</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style_spv.css">
</head>
<body>
  <div class="spv-shell">
    <aside class="spv-sidebar">
      <div class="spv-brand">
        <div class="spv-logo"><i class="fa-solid fa-user-tie"></i></div>
        <div>
          <h1>SPV Panel</h1>
          <p>Desktop Supervisor</p>
        </div>
      </div>

      <nav class="spv-nav">
        <a href="index.html" id="navDash"><i class="fa-solid fa-gauge"></i>Dashboard</a>
        <a href="target.html" id="navTarget" class="active"><i class="fa-solid fa-bullseye"></i>Target</a>
        <a href="approval.html" id="navApproval"><i class="fa-solid fa-check-to-slot"></i>Approval</a>
        <a href="aktivitas.html" id="navAktivitas"><i class="fa-solid fa-list-check"></i>Aktivitas</a>
      </nav>

      <div style="margin-top:auto; padding-top:14px;">
        <button class="btn btn-danger" style="width:100%;" onclick="logoutUser()">
          <i class="fa-solid fa-right-from-bracket" style="margin-right:8px;"></i>Keluar
        </button>
      </div>
    </aside>

    <main class="spv-main">
      <div class="spv-topbar">
        <h2 id="pageTitle">Target DO</h2>
        <div class="spv-user">
          <img id="spvAvatar" src="" alt="Avatar">
          <div class="meta">
            <span class="name" id="spvNama">Memuat...</span>
            <span class="role" id="spvRole">Memuat...</span>
          </div>
        </div>
      </div>

      <section class="spv-card">
        <div style="display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:flex-start;">
          <div>
            <h3 style="margin:0 0 6px; font-size:14px; color:var(--muted);">Ringkasan Bulan Ini</h3>
            <div style="font-size:28px; font-weight:1000; color:var(--primary-blue);" id="sumTarget">0</div>
            <div style="font-size:12px; color:var(--muted); font-weight:800; margin-top:2px;" id="sumPeriode">Memuat...</div>
          </div>
          <div style="display:flex; gap:16px;">
            <div>
              <div style="font-size:22px; font-weight:1000; color:#27ae60;" id="sumRealisasi">0</div>
              <div style="font-size:12px; color:var(--muted); font-weight:800;">Realisasi</div>
            </div>
            <div>
              <div style="font-size:22px; font-weight:1000; color:var(--primary-red);" id="sumSisa">0</div>
              <div style="font-size:12px; color:var(--muted); font-weight:800;">Sisa</div>
            </div>
            <div>
              <div style="font-size:22px; font-weight:1000; color:var(--primary-dark);" id="sumPersen">0%</div>
              <div style="font-size:12px; color:var(--muted); font-weight:800;">Persen</div>
            </div>
          </div>
        </div>

        <div style="margin-top:14px;" id="mingguanWrap">
          <h3 style="margin:14px 0 10px; font-size:14px; color:var(--muted);">Progress per Minggu</h3>
          <table class="table">
            <thead>
              <tr>
                <th style="width:120px;">Minggu</th>
                <th>Target</th>
                <th>Realisasi</th>
                <th style="width:140px;">Status</th>
              </tr>
            </thead>
            <tbody id="mingguanBody">
              <tr>
                <td colspan="4" style="color:var(--muted); font-weight:800; text-align:center;">Memuat...</td>
              </tr>
            </tbody>
          </table>

          <div style="margin-top:10px; color:var(--muted); font-size:12px; font-weight:700;" id="emptyMsg"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    function logoutUser(){
      localStorage.clear();
      window.location.href = '../pages/login.html';
    }

    function guardSPV(){
      const loggedIn = localStorage.getItem('loggedIn') === 'true';
      const role = localStorage.getItem('peranSales') || '';
      const roleUser = localStorage.getItem('roleUser') || '';
