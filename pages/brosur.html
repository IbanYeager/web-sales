<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales App - Brosur</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css" />
</head>

<body>
  <div class="mobile-app">
    <header class="header-page">
      <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
      <h2>Brosur</h2>
    </header>

    <div class="container" style="margin-top:18px;">
      <div class="card" style="padding:18px;">
        <h3 class="section-title" style="margin-bottom:6px;">Pilih Brosur</h3>
        <p style="font-size:12px;color:var(--text-muted);line-height:1.6;">
          Daftar brosur untuk ditampilkan dan dibagikan ke customer.
        </p>

        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;">
          <button class="btn-outline-blue" style="width:auto;padding:10px 14px;"
            onclick="alert('Bagikan Brosur (Demo)')">
            <i class="fa-solid fa-paper-plane"></i> Bagikan
          </button>
          <button class="btn-outline-blue" style="width:auto;padding:10px 14px;"
            onclick="alert('Simpan favorit (Demo)')">
            <i class="fa-regular fa-star"></i> Favorit
          </button>
        </div>
      </div>

      <div class="card" style="padding:0;">
        <div style="padding:14px 18px;border-bottom:1px solid var(--border-color);">
          <div class="section-title" style="margin:0;font-size:14px;">Daftar Brosur</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Live data</div>
        </div>

        <div id="brosurList" style="padding:14px 18px;display:flex;flex-direction:column;gap:12px;">
          <p style="font-size:12px;color:var(--text-muted);text-align:center;padding:10px;">Memuat brosur...</p>
        </div>
      </div>
    </div>
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span class="nav-label">Home</span></a>
            <a href="pricelist.html" class="nav-item"><i class="fa-solid fa-clipboard-list"></i><span class="nav-label">Pricelist</span></a>
            <a href="promo.html" class="nav-item"><i class="fa-solid fa-percent"></i><span class="nav-label">Promo</span></a>
            <a href="testdrive.html" class="nav-item"><i class="fa-solid fa-car-side"></i><span class="nav-label">Test Drive</span></a>
            <a href="profil.html" class="nav-item"><i class="fa-solid fa-user"></i><span class="nav-label">Profil</span></a>
        </nav>
  </div>

  <script>
    function fetchBrosur() {
      fetch('../api/api_brosur.php')
        .then(r => r.json())
        .then(res => {
          if (res.status === 'success' && res.data) {
            const el = document.getElementById('brosurList');
            if (!el) return;
            if (res.data.length === 0) {
              el.innerHTML = '<p style="font-size:12px;color:var(--text-muted);text-align:center;padding:10px;">Belum ada brosur.</p>';
              return;
            }
            el.innerHTML = res.data.map((b, idx) => `
              <a href="${b.pdf_url}" class="summary-item" target="_blank" style="cursor:pointer;">
                <div class="icon-box ${idx % 2 === 0 ? 'bg-blue' : 'bg-red'}"><i class="fa-solid fa-file-pdf"></i></div>
                <div class="summary-text">
                  <h4>${b.nama}</h4>
                  <p>${b.deskripsi}</p>
                </div>
              </a>
            `).join('');
          }
        })
        .catch(err => console.error("Error loading brochures:", err));
    }

    document.addEventListener('DOMContentLoaded', fetchBrosur);
  </script>
</body>

</html>
