<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales App - Detail Polreg</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css" />
  <style>
    .detail-container {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      border: 1px solid #eaeaea;
      margin-bottom: 20px;
    }

    /* Dropdown Filter Merk */
    .merk-dropdown-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }

    .merk-dropdown-wrapper .merk-logo-preview {
      position: absolute;
      left: 12px;
      width: 22px;
      height: 22px;
      object-fit: contain;
      border-radius: 4px;
      pointer-events: none;
      z-index: 1;
    }

    .merk-dropdown-wrapper i.chevron-icon {
      position: absolute;
      right: 14px;
      color: var(--text-muted, #777);
      font-size: 12px;
      pointer-events: none;
    }

    .merk-dropdown {
      width: 100%;
      padding: 12px 36px 12px 42px;
      border-radius: 12px;
      border: 1.5px solid #ddd;
      font-size: 13px;
      font-weight: 800;
      background: #fff;
      color: var(--text-dark, #333);
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .merk-dropdown:focus {
      outline: none;
      border-color: var(--primary-blue, #0056b3);
      box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
    }



    .search-container {
      margin-bottom: 16px;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-box i {
      position: absolute;
      left: 14px;
      color: #777;
      font-size: 14px;
    }

    .search-input {
      width: 100%;
      padding: 10px 10px 10px 38px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 12px;
      font-weight: 600;
    }

    .car-rank-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .car-rank-item {
      display: flex;
      align-items: center;
      background: #fff;
      padding: 12px;
      border-radius: 12px;
      gap: 12px;
      border: 1px solid #eee;
    }

    .car-rank-item.rank-1 {
      background: #fffdf0;
      border-color: #ffecb3;
    }

    .car-rank-item.rank-2 {
      background: #fafdff;
      border-color: #cfd8dc;
    }

    .car-rank-item.rank-3 {
      background: #fffbf7;
      border-color: #ffcc80;
    }

    .rank-number {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 11px;
      border-radius: 50%;
      background: #e0e0e0;
      color: #616161;
      flex-shrink: 0;
    }

    .rank-1 .rank-number {
      background: #ffdf00;
      color: #5d4037;
      font-size: 14px;
    }

    .rank-2 .rank-number {
      background: #b0bec5;
      color: #37474f;
      font-size: 14px;
    }

    .rank-3 .rank-number {
      background: #cd7f32;
      color: #ffffff;
      font-size: 14px;
    }

    .car-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .car-brand-badge {
      font-size: 9px;
      font-weight: 800;
      color: #fff;
      background: #6c757d;
      padding: 2px 6px;
      border-radius: 4px;
      width: fit-content;
      text-transform: uppercase;
    }

    .brand-badge-toyota {
      background: #eb0a1e;
    }

    .brand-badge-honda {
      background: #007bff;
    }

    .brand-badge-daihatsu {
      background: #28a745;
    }

    .car-type {
      font-size: 13px;
      font-weight: 700;
      color: #333;
    }

    .car-unit {
      font-size: 12px;
      font-weight: 800;
      color: #2e7d32;
      background: #e8f5e9;
      padding: 5px 10px;
      border-radius: 6px;
      text-align: center;
      min-width: 65px;
    }

    .car-unit span {
      font-size: 9px;
      font-weight: 600;
      display: block;
      color: #558b2f;
    }
  </style>
</head>

<body>
  <div class="mobile-app">
    <header class="header-page">
      <a href="polreg.html"><i class="fa-solid fa-arrow-left"></i></a>
      <h2 id="pageTitle">Detail Wilayah</h2>
    </header>

    <div class="container" style="margin-top: 18px; padding-bottom: 30px;">

      <div class="card"
        style="padding: 16px; margin-bottom: 16px; background: linear-gradient(135deg, #0056b3, #003a79); color: white;">
        <h3 id="displayKecamatan" style="margin: 0 0 4px 0; font-size: 17px;">Kecamatan...</h3>
        <p style="margin: 0; font-size: 11px; opacity: 0.9;">Analisis data registrasi mobil tahun <b
            id="displayTahun">...</b></p>
      </div>

      <div class="section-header-row" style="margin-bottom: 10px;">
        <h3 class="section-title" style="margin-bottom:0;">Filter Merk</h3>
        <span style="font-size: 11px; color: var(--text-muted);" id="countmerk">0 merk</span>
      </div>

      <div class="merk-dropdown-wrapper">
        <img id="merkLogoPreview" class="merk-logo-preview" src="../image/merk_icons/trophy.png" alt=""
          onerror="this.style.display='none'">
        <select id="merkSelect" class="merk-dropdown" onchange="selectKategoriFromDropdown(this.value)">
          <option value="Teratas">🏆 Semua Merk — Teratas</option>
        </select>
        <i class="fa-solid fa-chevron-down chevron-icon"></i>
      </div>

      <div class="search-container">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="searchType" class="search-input" placeholder="Cari type mobil (misal: Avanza)...">
        </div>
      </div>



      <div class="section-header-row" style="margin-bottom: 10px;">
        <h3 class="section-title" style="margin-bottom:0;" id="listTitle">Semua Type Kendaraan</h3>
        <span style="font-size: 11px; color: var(--text-muted);">Urutan Tertinggi ↓</span>
      </div>




      <div class="detail-container">
        <div id="loadingIndicator" style="text-align:center; padding: 20px; color:#777;">
          <i class="fa-solid fa-spinner fa-spin"></i> Memuat data...
        </div>
        <div class="car-rank-list" id="carList"></div>
      </div>


    </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span class="nav-label">Home</span></a>
            <a href="pricelist.html" class="nav-item"><i class="fa-solid fa-clipboard-list"></i><span class="nav-label">Pricelist</span></a>
            <a href="promo.html" class="nav-item"><i class="fa-solid fa-percent"></i><span class="nav-label">Promo</span></a>
            <a href="testdrive.html" class="nav-item"><i class="fa-solid fa-car-side"></i><span class="nav-label">Test Drive</span></a>
            <a href="profil.html" class="nav-item"><i class="fa-solid fa-user"></i><span class="nav-label">Profil</span></a>
        </nav>
  </div>

  <script src="../script.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const namaKecamatan = decodeURIComponent(urlParams.get('kecamatan') || "Coblong");
    const tahunPilihDefault = urlParams.get('tahun') || "2026";

    let currentKategori = 'Teratas';
    let activeCarsData = [];
    let currentSearchKeyword = '';
    let filterTahun = tahunPilihDefault;

    function setLoading(isLoading) {
      const loadingIndicator = document.getElementById('loadingIndicator');
      const carList = document.getElementById('carList');
      if (isLoading) {
        loadingIndicator.style.display = 'block';
        carList.innerHTML = '';
      } else {
        loadingIndicator.style.display = 'none';
      }
    }

    function renderTabs() {
      const merkSelect = document.getElementById('merkSelect');
      const merkLogoPreview = document.getElementById('merkLogoPreview');

      merkSelect.innerHTML = '';
      const totalAllUnits = activeCarsData.reduce((sum, car) => sum + car.unit, 0);

      // Option "Teratas" (Semua Merk)
      const terataseOption = document.createElement('option');
      terataseOption.value = 'Teratas';
      terataseOption.textContent = `🏆 Semua Merk — Teratas (${totalAllUnits} U)`;
      if (currentKategori === 'Teratas') terataseOption.selected = true;
      merkSelect.appendChild(terataseOption);

      // Hitung brand totals
      const brandCounts = {};
      activeCarsData.forEach(car => brandCounts[car.merk] = (brandCounts[car.merk] || 0) + car.unit);
      const merkList = Object.keys(brandCounts).sort();

      document.getElementById('countmerk').textContent = `${merkList.length} Merk Terdata`;

      // Tambah option untuk setiap brand
      merkList.forEach(merk => {
        const option = document.createElement('option');
        option.value = merk;
        option.textContent = `${merk} (${brandCounts[merk]} U)`;
        if (currentKategori === merk) option.selected = true;
        merkSelect.appendChild(option);
      });

      // Update logo preview
      updateMerkLogoPreview(currentKategori);
    }

    function updateMerkLogoPreview(merkName) {
      const merkLogoPreview = document.getElementById('merkLogoPreview');
      if (merkName === 'Teratas') {
        merkLogoPreview.style.display = 'none';
      } else {
        merkLogoPreview.src = `../image/merk_icons/${merkName.toLowerCase()}.jpg`;
        merkLogoPreview.style.display = 'block';
        merkLogoPreview.onerror = function () { this.style.display = 'none'; };
      }
    }

    function selectKategoriFromDropdown(merk) {
      selectKategori(merk);
      updateMerkLogoPreview(merk);
    }




    function renderCarList() {
      const listContainer = document.getElementById('carList');
      listContainer.innerHTML = '';
      document.getElementById('listTitle').textContent = currentKategori === 'Teratas' ? 'Semua Type Kendaraan' : `Type Kendaraan ${currentKategori}`;

      let filteredCars = activeCarsData;
      if (currentKategori !== 'Teratas') {
        filteredCars = activeCarsData.filter(car => car.merk.toLowerCase() === currentKategori.toLowerCase());
      }
      if (currentSearchKeyword !== '') {
        filteredCars = filteredCars.filter(car =>
          car.type.toLowerCase().includes(currentSearchKeyword) ||
          car.merk.toLowerCase().includes(currentSearchKeyword)
        );
      }

      if (filteredCars.length === 0) {
        listContainer.innerHTML = '<div style="text-align:center; padding: 25px; color:#777; font-size:12px;">Type mobil tidak ditemukan.</div>';
        return;
      }

      filteredCars.forEach((car, index) => {
        const rankNum = index + 1;
        let rankClass = rankNum <= 3 ? `rank-${rankNum}` : "";
        let rankBadge = rankNum === 1 ? "🥇" : rankNum === 2 ? "🥈" : rankNum === 3 ? "🥉" : rankNum;

        let badgeColor = "brand-badge-toyota"; // Default
        if (car.merk.toLowerCase() === 'honda') badgeColor = "brand-badge-honda";
        if (car.merk.toLowerCase() === 'daihatsu') badgeColor = "brand-badge-daihatsu";

        listContainer.innerHTML += `
          <div class="car-rank-item ${rankClass}">
            <div class="rank-number">${rankBadge}</div>
            <div class="car-info">
              <span class="car-brand-badge ${badgeColor}">${car.merk}</span>
              <span class="car-type">${car.type}</span>
            </div>
            <div class="car-unit">${car.unit} <span>Unit</span></div>
          </div>
        `;
      });
    }

    function selectKategori(kategori) {
      currentKategori = kategori;
      renderTabs();
      renderCarList();
    }




    document.getElementById('searchType').addEventListener('input', e => {
      currentSearchKeyword = e.target.value.toLowerCase().trim();
      renderCarList();
    });

    async function initPage() {
      document.getElementById('pageTitle').textContent = `Detail Wilayah ${tahunPilihDefault}`;
      document.getElementById('displayKecamatan').textContent = `Kecamatan ${namaKecamatan}`;
      document.getElementById('displayTahun').textContent = filterTahun;

      // Ambil data langsung (tanpa dropdown filter tahun/merk/type)
      try {
        document.getElementById('displayTahun').textContent = filterTahun;

        // hook search field (biar bisa filter by keyword di UI)
        document.getElementById('searchType').addEventListener('input', e => {
          currentSearchKeyword = e.target.value.toLowerCase().trim();
          renderCarList();
        });

        await fetchAndRender();
        setLoading(false);
      } catch (e) {
        console.error(e);
        document.getElementById('loadingIndicator').innerHTML = "Gagal memuat data.";
      }
    }

    async function fetchAndRender() {
      setLoading(true);
      const r = await fetch(`../api/api_polreg_detail.php?kecamatan=${encodeURIComponent(namaKecamatan)}&tahun=${encodeURIComponent(tahunPilihDefault)}`);
      const json = await r.json();
      if (json.ok) {
        activeCarsData = json.data;
        renderTabs();
        renderCarList();
        setLoading(false);
      } else {
        document.getElementById('loadingIndicator').innerHTML = `<span style="color:red;">Error: ${json.message}</span>`;
        setLoading(false);
      }
    }



    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>

</html>
