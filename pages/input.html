<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales App - Input Aktivitas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="mobile-app" style="padding-bottom: 100px;">
    <header class="header-page">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
        <h2>Input Aktivitas</h2>
        <i class="fa-solid fa-circle-info"></i>
    </header>

    <div class="container" style="margin-top: 20px;">
        <h3 class="section-title" style="margin-bottom: 5px;">Isi Aktivitas Anda</h3>
        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px;">Lengkapi informasi aktivitas dan foto kegiatan Anda saat ini.</p>

        <form id="formAktivitas">
            <div class="form-group">
                <label>Jenis Aktivitas <span style="color: var(--primary-red);">*</span></label>
                <select id="jenisAktivitas" class="form-control" required>
                    <option value="" disabled selected>Pilih aktivitas...</option>
                    <option value="visit">Visit Customer</option>
                    <option value="followup">Follow Up</option>
                    <option value="testdrive">Test Drive</option>
                </select>
            </div>

            <div class="form-group">
                <label>Keterangan Aktivitas <span style="color: var(--primary-red);">*</span></label>
                <textarea id="keteranganAktivitas" class="form-control" placeholder="Tuliskan keterangan detail di sini..." required></textarea>
            </div>

            <div class="form-group">
                <label>Lokasi <span style="color: var(--primary-red);">*</span></label>
                <div class="lokasi-box">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <i class="fa-solid fa-location-dot" style="color: var(--primary-red);"></i>
                        <div class="lokasi-text" id="lokasiValue">
                            <p>Bandung, Jawa Barat</p>
                            <span>Lokasi otomatis terdeteksi</span>
                        </div>
                    </div>
                    <button type="button" class="btn-outline" onclick="getLocation()">Ambil Lokasi</button>
                </div>
            </div>

            <div class="form-group">
                <label>Foto Aktivitas <span style="color: var(--primary-red);">*</span></label>
                <div class="photo-preview" id="photoPreview" style="flex-wrap: wrap; height: auto; min-height: 120px; padding: 10px; gap: 10px;">
                    <i class="fa-regular fa-image" style="font-size: 40px; opacity: 0.5;"></i>
                </div>
                <input type="file" id="inputFoto" accept="image/*" multiple hidden onchange="handleFileSelect(event)">
                <div class="btn-upload" onclick="document.getElementById('inputFoto').click()">
                    <i class="fa-solid fa-camera"></i> Tambah Foto (Maks. 5)
                </div>
            </div>
        </form>
    </div>

    <div class="fixed-bottom">
        <button type="button" class="btn-main" onclick="simpanData()" style="justify-content: center; background: var(--primary-blue);">
            <i class="fa-regular fa-paper-plane" style="margin-right: 10px;"></i> Simpan Aktivitas
        </button>
        <p style="text-align: center; font-size: 10px; color: var(--text-muted); margin-top: 10px;">
            <i class="fa-solid fa-lock"></i> Aktivitas akan dikirim ke supervisor
        </p>
    </div>
</div>

<script src="../script.js"></script>
<script>
  (function () {
    const logged = localStorage.getItem('loggedIn') === 'true';
    const selectedModel = localStorage.getItem('selectedTestDriveUnitModel');
    const selectedTipe = localStorage.getItem('selectedTestDriveUnitTipe');

    // Prefill hanya jika ada pilihan unit test drive
    if (!selectedModel) return;

    const form = document.getElementById('formAktivitas');
    if (!form) return;

    const select = form.querySelector('select.form-control');
    if (select) {
      select.value = 'testdrive';
    }

    const textarea = form.querySelector('textarea.form-control');
    if (textarea) {
      // kalau user sudah mengetik, jangan timpa
      const existing = textarea.value ? textarea.value.trim() : '';
      if (!existing) {
        const unitText = `Unit Test Drive: ${selectedModel}${selectedTipe ? ' (' + selectedTipe + ')' : ''}`;
        textarea.value = unitText;
      }
    }

    // Bersihkan setelah dipakai (agar tidak mengganggu jenis aktivitas berikutnya)
    // Jika Anda ingin selalu tersimpan, hapus bagian ini.
    localStorage.removeItem('selectedTestDriveUnitId');
    localStorage.removeItem('selectedTestDriveUnitModel');
    localStorage.removeItem('selectedTestDriveUnitTipe');
  })();
</script>
</body>
</html>
