<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales App - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="mobile-app" style="padding-bottom: 30px; position: relative;">
    
    <!-- Background Merah Melengkung di Belakang -->
    <div class="login-bg"></div>

    <!-- Header Transparan -->
    <header class="header-login">
    </header>

    <div class="container" style="margin-top: 10px;">
        
        <!-- Kartu Login Utama -->
        <div class="login-card">
            <div style="display: flex; justify-content: center; margin-bottom: -50px; margin-top: -30px;">
                <!-- PATH GAMBAR DIPERBAIKI MUNDUR 1 FOLDER -->
                <img src="../image/download-removebg-preview.png" style="width: 200px; height: 200px; object-fit: contain;">
            </div>

            <div class="input-group">
                <label>Username</label>
                <input type="text" class="input-modern" id="loginUsername" placeholder="Masukkan username" autocomplete="off" />
                <i class="fa-solid fa-user input-icon"></i>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" class="input-modern" id="loginPassword" placeholder="Masukkan password" />
                <i class="fa-solid fa-lock input-icon"></i>
                <i class="fa-regular fa-eye-slash toggle-password" id="togglePassword" onclick="togglePass()"></i>
            </div>

            <div style="text-align: right; margin-bottom: 20px;">
                <a href="#" style="font-size: 11px; font-weight: 700; color: var(--primary-red);">Lupa Password?</a>
            </div>

            <button id="loginBtn" class="btn-login" onclick="doLogin()">
                <span>Masuk Sekarang</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>

            <div id="loginInlineMsg" class="msg-box"></div>
        </div>

        <!-- Kartu Informasi Tambahan -->
        <div class="card" style="padding: 15px; margin-top: 20px; border: 1px solid var(--border-color); box-shadow: none;">
            <div style="display:flex; gap:12px; align-items:center;">
                <div style="width:38px; height:38px; border-radius:10px; background:#ebf5fb; color:var(--primary-blue); display:flex; justify-content:center; align-items:center; flex-shrink:0; font-size:16px;">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <div>
                    <h4 style="font-size:12px; font-weight:800; color: var(--text-dark); margin-bottom:2px;">Akses Terlindungi</h4>
                    <p style="font-size:10px; color: var(--text-muted); line-height:1.4;">
                        Data Anda dienkripsi secara aman. Hanya untuk penggunaan internal Tunas Toyota.
                    </p>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- PATH SCRIPT JS DIPERBAIKI -->
<script src="../script.js"></script>
<script>
    // Fitur Lihat/Sembunyikan Password
    function togglePass() {
        const passInput = document.getElementById('loginPassword');
        const eyeIcon = document.getElementById('togglePassword');
        
        if (passInput.type === 'password') {
            passInput.type = 'text';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        } else {
            passInput.type = 'password';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        }
    }

    // Fungsi Utama Login
    async function doLogin() {
        const username = document.getElementById('loginUsername')?.value?.trim();
        const password = document.getElementById('loginPassword')?.value;
        const btn = document.getElementById('loginBtn');
        const inlineMsg = document.getElementById('loginInlineMsg');

        // Helper untuk memunculkan pesan
        const showMsg = (text, type = 'error') => {
            if (!inlineMsg) return;
            inlineMsg.style.display = 'block';
            inlineMsg.textContent = text;
            
            if (type === 'error') {
                inlineMsg.className = 'msg-box msg-error';
            } else {
                inlineMsg.className = 'msg-box msg-info';
            }
        };

        if (!username || !password) {
            showMsg('Username dan password wajib diisi!', 'error');
            return;
        }

        try {
            // State Loading
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>Memproses...</span>';
            }
            showMsg('Menghubungkan ke server...', 'info');

            // URL FETCH MENGGUNAKAN RELATIF PATH (Mundur ke folder api)
            const res = await fetch('../api/api_login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (!data.ok) {
                showMsg(data.message || 'Login gagal, periksa kembali data Anda.', 'error');
                return;
            }

            // Jika sukses, ubah tampilan sukses sesaat
            showMsg('Login berhasil! Mengarahkan...', 'info');
            if (btn) {
                btn.style.background = '#27ae60'; // Warna hijau sukses
                btn.innerHTML = '<i class="fa-solid fa-check"></i> <span>Berhasil</span>';
            }

            // Set data ke LocalStorage
            localStorage.setItem('loggedIn', 'true');
            localStorage.setItem('salesId', String(data.sales.id));
            localStorage.setItem('namaSales', data.sales.name || '');
            localStorage.setItem('fotoSales', data.sales.foto || '');
            localStorage.setItem('peranSales', 'Sales Consultant');
            localStorage.setItem('cabangSales', 'Tunas Toyota Kiara Condong');

            // Pindah ke halaman index.html (Sama-sama di folder pages)
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 800);

        } catch (e) {
            // Error ini akan muncul jika file PHP mengembalikan error text bukan JSON (misal XAMPP mati/DB error)
            showMsg('Gagal terhubung ke Server. Pastikan MySQL menyala dan Database sudah ada.', 'error');
            console.error("Detail Error:", e);
        } finally {
            // Kembalikan tombol ke semula jika ada error
            if (btn && inlineMsg.className.includes('msg-error')) {
                btn.disabled = false;
                btn.innerHTML = '<span>Masuk Sekarang</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>';
            }
        }
    }

    // Eksekusi login saat menekan tombol "Enter" di keyboard
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            doLogin();
        }
    });
</script>
</body>
</html>
