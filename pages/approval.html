<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales App - Approval</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="mobile-app">
    <header class="header-page">
      <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
      <h2>Approval</h2>
      <i class="fa-solid fa-check-to-slot" aria-hidden="true"></i>
    </header>

    <div class="container" style="margin-top:18px;">
      <div class="card" style="padding:18px;">
        <h3 class="section-title" style="margin-bottom:6px;">Daftar Pengajuan (Demo)</h3>
        <p style="font-size:12px;color:var(--text-muted);line-height:1.6;">Halaman demo untuk approval SPK/dokumen.</p>

        <div style="display:flex;flex-direction:column;gap:12px;margin-top:14px;">
          <div class="summary-card" style="padding:14px;flex-direction:column;align-items:stretch;gap:10px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <div style="font-weight:800;color:var(--text-dark);font-size:13px;">SPK - Bapak Rudi</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Model: Rush</div>
              </div>
              <div style="font-size:10px;font-weight:800;background:#ebf5fb;color:#2980b9;padding:6px 10px;border-radius:999px;border:1px solid #dbe6ff;white-space:nowrap;">Menunggu</div>
            </div>
            <div style="display:flex;gap:10px;">
              <button class="btn-outline-blue" onclick="approveItem('Bapak Rudi')" style="flex:1;">Setujui</button>
              <button class="btn-outline" onclick="rejectItem('Bapak Rudi')" style="flex:1; border-color:var(--primary-red); color:var(--primary-red);">Tolak</button>
            </div>
          </div>

          <div class="summary-card" style="padding:14px;flex-direction:column;align-items:stretch;gap:10px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <div style="font-weight:800;color:var(--text-dark);font-size:13px;">SPK - Ibu Sinta</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Model: Raize</div>
              </div>
              <div style="font-size:10px;font-weight:800;background:#eafaf1;color:#27ae60;padding:6px 10px;border-radius:999px;border:1px solid #d6f5e0;white-space:nowrap;">Disetujui</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function approveItem(nama) {
      alert(`Setujui pengajuan untuk ${nama} (Demo)`);
    }
    function rejectItem(nama) {
      alert(`Tolak pengajuan untuk ${nama} (Demo)`);
    }
  </script>
</body>
</html>
