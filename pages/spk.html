<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales App - Form SPK</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css" />
</head>

<body>
  <div class="mobile-app">
    <header class="header-page">
      <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
      <h2>Form SPK</h2>
    </header>

    <div class="container" style="margin-top:18px;">
      <div class="card" style="padding:18px;">
        <h3 class="section-title" style="margin-bottom:6px;">Buat SPK (Demo)</h3>
        <p style="font-size:12px;color:var(--text-muted);line-height:1.6;">Form ini demo. Nanti bisa dihubungkan dengan
          sistem SPK & approval.</p>

        <div class="form-group" style="margin-top:14px;">
          <label>Nama Customer</label>
          <input class="form-control" type="text" id="namaCustomer" placeholder="Nama customer" />
        </div>

        <div class="form-group">
          <label>No. HP</label>
          <input class="form-control" type="tel" id="noHp" placeholder="08xxxxxxxxxx" />
        </div>

        <div class="form-group">
          <label>Pilih Model</label>
          <select class="form-control" id="model">
            <option value="Avanza">Avanza</option>
            <option value="Calya">Calya</option>
            <option value="Raize" selected>Raize</option>
            <option value="Raush">Rush</option>
          </select>
        </div>

        <button class="btn-main" style="margin-top:8px;" onclick="submitSpk()">
          <i class="fa-solid fa-paper-plane" style="margin-right:10px;"></i>
          Submit SPK
        </button>
      </div>

      <div class="card">
        <div class="section-title" style="margin:0 0 10px 0; font-size:14px;">Daftar Pengajuan SPK</div>
        <div id="spkList" style="display:flex; flex-direction:column; gap:10px;">
          <p style="font-size:12px;color:var(--text-muted);line-height:1.6;" id="statusSpk">Belum ada pengajuan.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const sales_account_id = localStorage.getItem('idSales') || 1;

    function fetchSpk() {
      fetch(`../api/api_spk.php?sales_account_id=${sales_account_id}`)
        .then(r => r.json())
        .then(res => {
          if (res.status === 'success' && res.data) {
            const listEl = document.getElementById('spkList');
            if (!listEl) return;

            if (res.data.length === 0) {
              listEl.innerHTML = '<p style="font-size:12px;color:var(--text-muted);line-height:1.6;">Belum ada pengajuan.</p>';
              return;
            }

            listEl.innerHTML = res.data.map(s => {
              let badgeClass = 'chip-yellow';
              if (s.status === 'Disetujui') badgeClass = 'chip-green';
              else if (s.status === 'Ditolak') badgeClass = 'chip-red';

              return `
                <div style="border-bottom: 1px solid var(--border-color); padding-bottom:8px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                  <div>
                    <h4 style="font-size:13px; margin:0 0 4px 0;">${s.nama_customer}</h4>
                    <p style="font-size:11px; color:var(--text-muted); margin:0;">${s.model} • Rp ${s.nominal_jt} Jt • ${s.tipe_pembelian}</p>
                  </div>
                  <span class="chip ${badgeClass}" style="font-size:10px; font-weight:800; padding:4px 8px;">${s.status}</span>
                </div>
              `;
            }).join('');
          }
        })
        .catch(err => console.error("Error loading SPKs:", err));
    }

    function submitSpk() {
      const nama = document.getElementById('namaCustomer').value.trim();
      const hp = document.getElementById('noHp').value.trim();
      const model = document.getElementById('model').value;

      if (!nama || !hp) {
        alert('Nama customer dan No. HP wajib diisi.');
        return;
      }

      const btn = document.querySelector('.btn-main');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';

      fetch('../api/api_spk.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'submit',
          sales_account_id,
          nama_customer: nama,
          no_hp: hp,
          model
        })
      })
        .then(r => r.json())
        .then(res => {
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-paper-plane" style="margin-right:10px;"></i> Submit SPK';

          if (res.status === 'success') {
            alert('SPK berhasil diajukan ke Supervisor!');
            document.getElementById('namaCustomer').value = '';
            document.getElementById('noHp').value = '';
            fetchSpk();
          } else {
            alert('Gagal mengajukan SPK: ' + res.message);
          }
        })
        .catch(err => {
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-paper-plane" style="margin-right:10px;"></i> Submit SPK';
          console.error(err);
          alert('Gagal terhubung ke server.');
        });
    }

    document.addEventListener('DOMContentLoaded', fetchSpk);
  </script>
</body>

</html>
