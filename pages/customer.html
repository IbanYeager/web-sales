<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales App - Customer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="mobile-app">
    <header class="header-page">
      <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
      <h2>Customer</h2>
      <i class="fa-solid fa-users" aria-hidden="true"></i>
    </header>

    <div class="container" style="margin-top:18px;">
      <div class="card" style="padding:18px;">
        <h3 class="section-title" style="margin-bottom:6px;">Data Customer (Demo)</h3>
        <p style="font-size:12px;color:var(--text-muted);line-height:1.6;">Cari dan pilih customer untuk membuat aktivitas atau SPK.</p>

        <div class="form-group" style="margin-top:14px;">
          <label>Cari Customer</label>
          <input class="form-control" type="text" id="searchCustomer" placeholder="Ketik nama customer..." />
        </div>
      </div>

      <div class="card" style="padding:0;">
        <div style="padding:14px 18px;border-bottom:1px solid var(--border-color);">
          <div class="section-title" style="margin:0;font-size:14px;">Daftar</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Demo data</div>
        </div>

        <div id="customerList" style="padding:14px 18px;display:flex;flex-direction:column;gap:12px;"></div>
      </div>
    </div>
  </div>

  <script>
    const customers = [
      { nama: 'Bapak Andi', alamat: 'Bandung - Coblong', status: 'Follow Up' },
      { nama: 'Ibu Sinta', alamat: 'Bandung - Antapani', status: 'Terjadwal' },
      { nama: 'Bapak Rudi', alamat: 'Bandung - Bojongloa Kaler', status: 'SPK' },
      { nama: 'Bapak Ahmad', alamat: 'Bandung - Antapani', status: 'Test Drive' },
    ];

    function render(list) {
      const el = document.getElementById('customerList');
      if(!el) return;
      el.innerHTML = '';
      list.forEach(c => {
        const node = document.createElement('a');
        node.href = '#';
        node.className = 'summary-item';
        node.style.cursor = 'pointer';
        node.innerHTML = `
          <div class="icon-box ${c.status === 'SPK' ? 'bg-red' : 'bg-blue'}"><i class="fa-solid fa-user"></i></div>
          <div class="summary-text">
            <h4 style="margin-bottom:4px;">${c.nama}</h4>
            <p>${c.alamat}</p>
          </div>
          <div style="font-size:10px;font-weight:800;background:#f5eef8;border:1px solid #eadcf4;padding:6px 10px;border-radius:999px;color:var(--primary-blue);white-space:nowrap;">${c.status}</div>
        `;
        node.onclick = (e) => {
          e.preventDefault();
          alert(`Menu customer: ${c.nama} (Demo)`);
        };
        el.appendChild(node);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      render(customers);

      const input = document.getElementById('searchCustomer');
      if(!input) return;
      input.addEventListener('input', () => {
        const q = input.value.trim().toLowerCase();
        const filtered = customers.filter(c => c.nama.toLowerCase().includes(q));
        render(filtered);
      });
    });
  </script>
</body>
</html>
