<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales App - Input Jadwal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css" />
  <style>
    .form-help { font-size: 12px; color: var(--text-muted); margin-top: -6px; margin-bottom: 20px; line-height: 1.6; }
    .jadwal-form .form-group { margin-bottom: 22px; }
    .btn-row { display:flex; gap:12px; }
    .btn-row .btn-main { flex:1; }
    .btn-secondary {
      display:flex; justify-content:center; align-items:center; gap:10px;
      border:none; cursor:pointer; border-radius:16px; font-weight:700; font-size:15px;
      background: #eef3fb; color: var(--primary-blue); padding: 16px 20px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
    }
    .btn-secondary:active { transform: translateY(2px) scale(0.98); }

    .status-chip { display:flex; gap:10px; flex-wrap:wrap; }
    .chip-btn {
      flex: 1; min-width: 140px;
      padding: 12px;
      border-radius: 14px;
      border: 1.5px solid var(--border-color);
      background: #fff;
      color: var(--text-dark);
      font-weight: 800;
      font-size: 13px;
      cursor:pointer;
      box-shadow: var(--shadow-sm);
      transition: 0.2s;
    }
    .chip-btn:active { transform: scale(0.98); }
    .chip-btn.active { background: rgba(15,48,87,0.08); border-color: rgba(15,48,87,0.35); color: var(--primary-blue); }

    .form-control, .input-modern { background:#f8fafc; }
  </style>
</head>
<body>
  <div class="mobile-app">
    <header class="header-page">
      <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
      <h2>Input Jadwal</h2>
      <i class="fa-solid fa-calendar-days" aria-hidden="true"></i>
    </header>

    <div class="container jadwal-form" style="margin-top:18px;">
      <h3 class="section-title" style="margin-bottom:6px;">Buat Jadwal Hari Ini</h3>
      <div class="form-help">Setelah tersimpan, panel <b>Jadwal Hari Ini</b> di halaman <b>Dashboard</b> akan ter-update otomatis.</div>

      <form id="formJadwal">
        <div class="form-group">
          <label>Waktu <span style="color: var(--primary-red);">*</span></label>
          <input class="form-control" type="time" id="jadwalWaktu" required />
        </div>

        <div class="form-group">
          <label>Judul Kegiatan <span style="color: var(--primary-red);">*</span></label>
          <input class="form-control" type="text" id="jadwalJudul" placeholder="Misal: Follow Up Andi" required />
        </div>

        <div class="form-group">
          <label>Nama Customer/Unit <span style="color: var(--primary-red);">*</span></label>
          <input class="form-control" type="text" id="jadwalDeskripsi" placeholder="Misal: Bapak Andi - Innova" required />
        </div>

        <div class="form-group">
          <label>Status <span style="color: var(--primary-red);">*</span></label>
          <div class="status-chip">
            <button type="button" class="chip-btn active" data-status="Selesai">Selesai</button>
            <button type="button" class="chip-btn" data-status="Terjadwal">Terjadwal</button>
          </div>
          <input type="hidden" id="jadwalStatus" value="Selesai" required />
        </div>

        <div class="btn-row">
          <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-xmark"></i> Batal
          </button>
          <button type="button" class="btn-main" style="background: var(--primary-blue); box-shadow: 0 4px 15px rgba(15,48,87,0.25)" onclick="simpanJadwal()">
            <i class="fa-regular fa-paper-plane"></i> Simpan
          </button>
        </div>
      </form>
    </div>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span class="nav-label">Home</span></a>
      <a href="pricelist.html" class="nav-item"><i class="fa-solid fa-clipboard-list"></i><span class="nav-label">Pricelist</span></a>
      <a href="promo.html" class="nav-item"><i class="fa-solid fa-percent"></i><span class="nav-label">Promo</span></a>
      <a href="testdrive.html" class="nav-item"><i class="fa-solid fa-car-side"></i><span class="nav-label">Test Drive</span></a>
      <a href="profil.html" class="nav-item"><i class="fa-solid fa-user"></i><span class="nav-label">Profil</span></a>
    </nav>
  </div>

  <script src="../script.js"></script>
  <script>
    // Status chip
    document.querySelectorAll('.chip-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('jadwalStatus').value = btn.getAttribute('data-status');
      });
    });

    function simpanJadwal() {
      const form = document.getElementById('formJadwal');
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const waktu = document.getElementById('jadwalWaktu').value;
      const judul = document.getElementById('jadwalJudul').value.trim();
      const deskripsi = document.getElementById('jadwalDeskripsi').value.trim();
      const status = document.getElementById('jadwalStatus').value;
      const sales_account_id = localStorage.getItem('idSales') || 1;

      fetch('../api/api_jadwal.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sales_account_id, waktu, judul, deskripsi, status })
      })
      .then(r => r.json())
      .then(res => {
        if (res.status === 'success') {
          alert('Jadwal berhasil disimpan di database!');
          window.location.href = 'index.html';
        } else {
          alert('Gagal menyimpan jadwal: ' + res.message);
        }
      })
      .catch(err => {
        console.error(err);
        alert('Gagal terhubung ke server.');
      });
    }
  </script>
</body>
</html>
