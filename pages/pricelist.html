<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales App - PriceList OTR</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="mobile-app">
    <header class="header-page">
      <h2>PriceList OTR</h2>
      <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
    </header>

    <div class="container" style="margin-top: 18px;">
      <h3 class="section-title" style="margin-bottom: 5px;">OTR Jawa Barat</h3>
      <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 15px;">
        Pilih kota/kecamatan untuk melihat estimasi jumlah tipe mobil di POl-REG (demo data).
      </p>

      <div class="card" style="padding: 16px; margin-bottom: 16px;">
        <div class="form-group" style="margin-bottom: 12px;">
          <label>Provinsi</label>
          <select class="form-control" disabled>
            <option>Jawa Barat</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom: 0;">
          <label>Kota</label>
          <select class="form-control" id="kota" onchange="updateKecamatan()">
            <option value="bandung">Bandung</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom: 0; margin-top: 12px;">
          <label>Kecamatan</label>
          <select class="form-control" id="kecamatan" onchange="renderTipeMobil()">
            <!-- diisi lewat JS -->
          </select>
        </div>
      </div>

      <div class="card" style="padding: 16px;">
        <div class="promo-section-header" style="margin-bottom: 12px;">
          <h3 class="section-title" style="margin-bottom: 0;">Jenis Tipe Mobil & Jumlah</h3>
          <a href="#" style="pointer-events:none;">Demo</a>
        </div>

        <div class="grid-2">

          <div class="summary-item" style="flex-direction: column; align-items:flex-start; gap: 8px;">
            <div class="icon-box bg-blue" style="width: 38px; height: 38px;"><i class="fa-solid fa-car-side"></i></div>
            <div class="summary-text">
              <h4 style="margin-bottom: 4px;" id="statRingkas">-</h4>
              <p>Ringkasan tipe teratas</p>
            </div>
          </div>

          <div class="summary-item" style="flex-direction: column; align-items:flex-start; gap: 8px;">
            <div class="icon-box bg-red" style="width: 38px; height: 38px;"><i class="fa-solid fa-map-location-dot"></i></div>
            <div class="summary-text">
              <h4 style="margin-bottom: 4px;" id="statLokasi">-</h4>
              <p>Lokasi polreg (kecamatan)</p>
            </div>
          </div>
        </div>

        <div class="card" style="background: transparent; padding: 0; margin-top: 14px; box-shadow: none; border-radius: 0;">
          <div class="grid-2" id="listTipeMobil">
            <!-- items -->
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i></a>
        <a href="pricelist.html" class="nav-item active"><i class="fa-solid fa-clipboard-list"></i></a>
        <a href="promo.html" class="nav-item"><i class="fa-solid fa-percent"></i></a>
        <a href="testdrive.html" class="nav-item"><i class="fa-solid fa-car-side"></i></a>
                <a href="profil.html" class="nav-item"><i class="fa-solid fa-user"></i></a>
    </nav>

  </div>

  <script>
    // Demo data polreg perkecamatan di Kota Bandung
    // format: kecamatan -> array tipe mobil { tipe, jumlah }
    const dataPolreg = {
      "Coblong": [
        { tipe: "MPV (Avanza/Calya)", jumlah: 128 },
        { tipe: "SUV (HR-V/Raize)", jumlah: 76 },
        { tipe: "Sedan (Civic/Accord)", jumlah: 22 },
        { tipe: "Low MPV (Xenia)", jumlah: 44 }
      ],
      "Antapani": [
        { tipe: "MPV (Avanza/Calya)", jumlah: 98 },
        { tipe: "SUV (HR-V/Raize)", jumlah: 61 },
        { tipe: "LWB/Commercial", jumlah: 27 },
        { tipe: "Sedan (Civic/Accord)", jumlah: 18 }
      ],
      "Bojongloa Kaler": [
        { tipe: "MPV (Avanza/Calya)", jumlah: 142 },
        { tipe: "SUV (HR-V/Raize)", jumlah: 54 },
        { tipe: "Hatchback (Jazz)", jumlah: 39 },
        { tipe: "Sedan (Civic/Accord)", jumlah: 25 }
      ]
    };

    const kecamatanSelect = () => document.getElementById('kecamatan');
    const listTipeMobil = () => document.getElementById('listTipeMobil');

    function updateKecamatan() {
      const kota = document.getElementById('kota').value; // demo tetap Bandung
      const kecamatan = Object.keys(dataPolreg);

      const sel = kecamatanSelect();
      sel.innerHTML = '';
      kecamatan.forEach((k) => {
        const opt = document.createElement('option');
        opt.value = k;
        opt.textContent = k;
        sel.appendChild(opt);
      });

      renderTipeMobil();
    }

    function renderTipeMobil() {
      const kec = kecamatanSelect().value;
      const items = dataPolreg[kec] || [];

      // ringkasan
      const top = [...items].sort((a,b)=>b.jumlah-a.jumlah)[0];
      document.getElementById('statRingkas').textContent = top ? `${top.tipe} • ${top.jumlah} unit` : '-';
      document.getElementById('statLokasi').textContent = kec ? `${kec} • Bandung` : '-';

      // list
      const grid = listTipeMobil();
      grid.innerHTML = '';
      items.forEach((it) => {
        const el = document.createElement('div');
        el.className = 'summary-item';
        el.style.flexDirection = 'column';
        el.style.alignItems = 'flex-start';
        el.style.gap = '6px';

        el.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="icon-box bg-blue" style="width:38px;height:38px;"><i class="fa-solid fa-car-side-side"></i></div>
            <div class="summary-text">
              <h4 style="margin-bottom:2px; font-size:14px;">${it.tipe}</h4>
              <p style="font-size:10px;">Jumlah unit</p>
            </div>
          </div>
          <div style="font-weight:700;color:var(--primary-blue);font-size:16px;">${it.jumlah}</div>
        `;

        grid.appendChild(el);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateKecamatan();
    });
  </script>
</body>
</html>
